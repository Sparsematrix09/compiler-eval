<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzeel Demo - Dead Code Elimination</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            flex: 1;
            max-width: 250px;
        }
        .stat-card h3 { color: #667eea; margin-bottom: 10px; }
        .stat-card .number { font-size: 2rem; font-weight: bold; color: #333; }
        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            flex: 1;
            min-width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 { color: #667eea; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; transform: scale(1.02); }
        .btn-secondary { background: #48bb78; color: white; }
        .btn-secondary:hover { background: #38a169; }
        .btn-danger { background: #f56565; color: white; }
        .btn-danger:hover { background: #e53e3e; }
        .console {
            background: #1a1a2e;
            color: #0f0;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .console h3 { color: #fff; margin-bottom: 10px; }
        .log-line { margin: 5px 0; border-left: 2px solid #0f0; padding-left: 10px; }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-used { background: #48bb78; color: white; }
        .badge-dead { background: #f56565; color: white; }
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Muzeel</h1>
            <p>Dynamic JavaScript Dead Code Elimination</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Functions</h3>
                <div class="number" id="totalFunctions">0</div>
            </div>
            <div class="stat-card">
                <h3>Used Functions</h3>
                <div class="number" id="usedFunctions">0</div>
            </div>
            <div class="stat-card">
                <h3>Dead Functions</h3>
                <div class="number" id="deadFunctions">0</div>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <h2>Interactive Demo</h2>
                <div class="button-group">
                    <button class="btn-primary" onclick="handleClick()">Click Me (Used)</button>
                    <button class="btn-secondary" onmouseover="handleHover()" onmouseout="handleHoverOut()">
                        Hover Over Me (Used)
                    </button>
                    <button class="btn-danger" onclick="showAlert()">Show Alert (Used)</button>
                    <button onclick="calculateSum(5, 10)">Calculate Sum (Used)</button>
                </div>
                <div id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 8px;">
                    Output will appear here...
                </div>
            </div>

            <div class="card">
                <h2>Function Analysis</h2>
                <div id="functionList"></div>
            </div>
        </div>

        <div class="console">
            <h3>Execution Console</h3>
            <div id="consoleLogs"></div>
        </div>
        <footer>
            <p>Muzeel identifies and eliminates dead code by emulating user interactions</p>
        </footer>
    </div>

    <script src="/original.js"></script>
    <script>
        // Console logger
        function addLog(message, type = 'info') {
            const consoleDiv = document.getElementById('consoleLogs');
            const logLine = document.createElement('div');
            logLine.className = 'log-line';
            logLine.style.borderLeftColor = type === 'used' ? '#48bb78' : '#f56565';
            logLine.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleDiv.appendChild(logLine);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // Override console.log to capture in UI
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '));
        };

        // Update stats display
        function updateStats() {
            if (window.functionTracker) {
                document.getElementById('totalFunctions').innerText = window.functionTracker.total;
                document.getElementById('usedFunctions').innerText = window.functionTracker.used;
                document.getElementById('deadFunctions').innerText = window.functionTracker.dead;
                
                // Update function list
                const listDiv = document.getElementById('functionList');
                listDiv.innerHTML = '';
                window.functionTracker.functions.forEach(func => {
                    const badge = func.used ? '<span class="badge badge-used"> USED</span>' : '<span class="badge badge-dead">DEAD</span>';
                    listDiv.innerHTML += `<div style="margin: 8px 0; font-size: 0.9rem;">${badge} ${func.name}</div>`;
                });
            }
        }

        setTimeout(updateStats, 100);
    </script>
</body>
</html>
